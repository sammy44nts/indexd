name: Benchmark Check

on:
  push:
    branches: [ master ]
  pull_request:
    branches: [ master ]

jobs:
  benchmark:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres
        env:
          POSTGRES_USER: indexd_benchmark
          POSTGRES_PASSWORD: indexd_benchmark
          POSTGRES_DB: indexd_benchmark
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      POSTGRES_USER: indexd_benchmark
      POSTGRES_PASSWORD: indexd_benchmark
      POSTGRES_DB: indexd_benchmark
      POSTGRES_HOST: localhost
      POSTGRES_PORT: 5432

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.22'

      - name: Install benchstat
        run: go install golang.org/x/perf/cmd/benchstat@latest

      - name: Run benchmarks
        run: go test -bench=. -benchmem -run=^$ -timeout=1h -benchtime=150x ./... | tee new_bench.txt

      - name: Fetch baseline benchmark
        run: |
          git fetch origin master
          git checkout master -- baseline_bench.txt || echo "No baseline found, skipping"

      - name: Compare benchmarks
        run: |
          if [ -f baseline_bench.txt ]; then
            benchstat baseline_bench.txt new_bench.txt > benchdiff.txt
            cat benchdiff.txt
          else
            echo "No baseline to compare. Skipping comparison."
          fi

      - name: Fail on regression
        run: |
          if [ -f benchdiff.txt ]; then
            if grep -E '([3-9][0-9]%|[1-9][0-9]{2,}%?)' benchdiff.txt; then
              echo "Performance regression detected! 🔥"
              exit 1
            else
              echo "No significant regression detected. ✅"
            fi
          else
            echo "No benchmark comparison done."
          fi

      - name: Save latest benchmark as artifact
        uses: actions/upload-artifact@v4
        with:
          name: latest-benchmark
          path: new_bench.txt