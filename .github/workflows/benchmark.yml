name: Benchmark Check

on:
  push:
    branches: [ master ]
  pull_request:
    branches: [ master ]

jobs:
  benchmark:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres
        env:
          POSTGRES_USER: indexd_benchmark
          POSTGRES_PASSWORD: indexd_benchmark
          POSTGRES_DB: indexd_benchmark
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      POSTGRES_USER: indexd_benchmark
      POSTGRES_PASSWORD: indexd_benchmark
      POSTGRES_DB: indexd_benchmark
      POSTGRES_HOST: localhost
      POSTGRES_PORT: 5432

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.23'

      - name: Install benchstat
        run: go install golang.org/x/perf/cmd/benchstat@latest

      - name: Run benchmarks
        run: |
          go test -run='^$' -bench=. -count=10 -benchtime=25x -timeout=60m ./... > new_bench.txt

      - name: Save latest benchmark as artifact
        uses: actions/upload-artifact@v4
        with:
          name: latest-benchmark
          path: new_bench.txt

      - name: Check for baseline benchmark
        id: lookup_baseline
        run: |
          git fetch origin master
          if git ls-tree --name-only origin/master | grep -q '^baseline_bench.txt$'; then
            git checkout origin/master -- baseline_bench.txt
            echo "baseline_found=true" >> $GITHUB_OUTPUT
          else
            echo "No baseline found in origin/master, skipping"
            echo "baseline_found=false" >> $GITHUB_OUTPUT
          fi

      - name: Compare benchmarks
        if: steps.lookup_baseline.outputs.baseline_found == 'true'
        run: |
          benchstat baseline_bench.txt new_bench.txt > benchdiff.txt
          cat benchdiff.txt

      - name: Fail on regression
        if: steps.lookup_baseline.outputs.baseline_found == 'true'
        run: |
          if grep -E '([3-9][0-9]%|[1-9][0-9]{2,}%?)' benchdiff.txt; then
            echo "Performance regression detected! 🔥"
            exit 1
          else
            echo "No significant regression detected. ✅"
          fi
