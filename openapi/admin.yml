openapi: "3.0.0"
info:
  title: Indexd Admin API
  description: >
    The Admin API lets you monitor and manage the Indexd service. It provides access to system status, accounts, contracts, host settings, pricing, and wallet functions.
    This API is meant for internal use by operators who need to keep the service running smoothly.
  version: 1.0.0

servers:
  - url: http://localhost:9980/api

tags:
  - name: accounts
    description: Manage ephemeral accounts used to fund storage operations on behalf of clients.

  - name: contracts
    description: View and manage storage contracts and their metadata.

  - name: debug
    description: >
      Access debugging and profiling tools for performance analysis and troubleshooting.
      These routes are only available when running the indexer in debug mode.

  - name: hosts
    description: Query host details, filter usable or blocked hosts, and manage the host blocklist.

  - name: misc
    description: Access general indexer state, recommended transaction fee or exchange rate information.

  - name: consensus
    description: Retrieve consensus state and network parameters for the connected chain.

  - name: settings
    description: Configure contract maintenance, host selection criteria, and price pinning behavior.

  - name: wallet
    description: Inspect wallet balance, track events, and send Siacoin transactions.

  - name: stats
    description: Statistics about this indexer.

  - name: alerts
    description: Retrieve and manage alerts generated by the indexer.

  - name: apps
    description: Manage app connect keys.

  - name: quotas
    description: Manage quotas for app connect keys.

paths:
  /state:
    get:
      tags:
        - misc
      summary: "Get the state of the indexer"
      description: Returns general information about the indexer.
      operationId: getState
      responses:
        "200":
          description: The state of the indexer
          content:
            application/json:
              schema:
                type: object
                allOf:
                  - $ref: "#/components/schemas/BuildState"
                properties:
                  network:
                    type: string
                    description: The network we are on (typically mainnet, zen, or anigami)
                  startTime:
                    type: string
                    format: date-time
                    description: The start time of the indexer.
                  explorer:
                    type: object
                    description: The settings of the external explorer we are using.
                    allOf:
                      - $ref: "#/components/schemas/Explorer"
                  scanHeight:
                    type: integer
                    format: uint64
                    description: The height up until which the wallet is synced
                  synced:
                    type: boolean
                    description: Whether we have seen a block from the past three hours.
      x-codeSamples:
        - lang: Go
          label: Go
          source: |
            package main

            import (
              "context"
              admin "go.sia.tech/indexd/admin"
            )

            func main() {
              c := admin.NewClient("http://localhost:9980", "your-admin-password")
              state, err := c.State(context.Background())
              // ...
            }
        - lang: JavaScript
          label: JavaScript
          source: |
            import { Admin } from "@siafoundation/indexd-js"

            const admin = Admin({
              api: "http://localhost:9980/api",
              password: "your-admin-password"
            })
            const state = await admin.state()

  /consensus/state:
    get:
      tags:
        - consensus
      summary: Get the current consensus state
      description: Returns the chain state at the current tip (excluding network parameters).
      operationId: getConsensusState
      responses:
        "200":
          description: The current consensus state
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ConsensusState"

  /consensus/network:
    get:
      tags:
        - consensus
      summary: Get the consensus network parameters
      description: Returns the fixed parameters for the connected chain.
      operationId: getConsensusNetwork
      responses:
        "200":
          description: The consensus network parameters
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ConsensusNetwork"

  /apps/connect/keys:
    get:
      tags:
        - apps
      summary: Get app connect keys within the provided offset and limit
      operationId: getAppConnectKeys
      parameters:
        - name: limit
          in: query
          description: The maximum number of connect keys to return
          schema:
            type: integer
            minimum: 1
            maximum: 500
            default: 100
        - name: offset
          in: query
          description: The number of connect keys to skip
          schema:
            type: integer
            minimum: 0
            default: 0
      responses:
        "200":
          description: A list of app connect keys
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/ConnectKey"
    put:
      tags:
        - apps
      summary: Update an existing app connect key
      description: Updates the description and quota of an existing app connect key. The key must already exist.
      operationId: updateAppConnectKey
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              allOf:
                - $ref: "#/components/schemas/AppConnectKeyRequest"
                - description: Update app connect key request
                  required:
                    - key
                    - quota
      responses:
        "200":
          description: App connect key updated successfully
        "400":
          description: Quota is required
        "404":
          description: Connect key or quota not found
    post:
      tags:
        - apps
      summary: Create a new app connect key
      description: Creates a new app connect key. If the key field is omitted, a random key will be generated.
      operationId: createAppConnectKey
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              allOf:
                - $ref: "#/components/schemas/AppConnectKeyRequest"
                - description: Create app connect key request
                - required:
                  - quota
      responses:
        "200":
          description: App connect key created successfully
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/ConnectKey"
                  - description: The newly created app connect key.
        "400":
          description: Quota is required
        "404":
          description: Quota not found
        "409":
          description: Connect key already exists

  /apps/connect/keys/{connectkey}:
    get:
      tags:
        - apps
      summary: Retrieve an individual app connect key
      description: Get a connect key from the indexer.
      operationId: getConnectKey
      parameters:
        - name: connectkey
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Connect key retrieved successfully
          content:
            application/json:
              schema:
                type: object
                allOf:
                  - $ref: "#/components/schemas/ConnectKey"
        "404":
          description: Connect key not found
    delete:
      tags:
        - apps
      summary: Delete an app connect key
      description: Delete an app connect key from the indexer.
      operationId: deleteConnectKey
      parameters:
        - name: connectkey
          in: path
          required: true
          schema:
            type: string
      responses:
        "204":
          description: Connect key deleted successfully
        "404":
          description: Connect key not found

  /quotas:
    get:
      tags:
        - quotas
      summary: Get all quotas
      description: Returns a list of all quotas.
      operationId: getQuotas
      parameters:
        - name: limit
          in: query
          description: The maximum number of quotas to return
          schema:
            type: integer
            minimum: 1
            maximum: 500
            default: 100
        - name: offset
          in: query
          description: The number of quotas to skip
          schema:
            type: integer
            minimum: 0
            default: 0
      responses:
        "200":
          description: A list of quotas
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Quota"

  /quotas/{key}:
    get:
      tags:
        - quotas
      summary: Get a quota by key
      description: Returns a single quota by its key.
      operationId: getQuota
      parameters:
        - name: key
          in: path
          required: true
          description: The unique key of the quota
          schema:
            $ref: "#/components/schemas/QuotaKey"
      responses:
        "200":
          description: The quota
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Quota"
        "404":
          description: Quota not found
    put:
      tags:
        - quotas
      summary: Create or update a quota
      description: Creates a new quota or updates an existing one with the given key.
      operationId: putQuota
      parameters:
        - name: key
          in: path
          required: true
          description: The unique key of the quota
          schema:
            $ref: "#/components/schemas/QuotaKey"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/PutQuotaRequest"
      responses:
        "204":
          description: Quota created or updated successfully
    delete:
      tags:
        - quotas
      summary: Delete a quota
      description: Deletes a quota by its key. Fails if the quota is in use by any connect keys.
      operationId: deleteQuota
      parameters:
        - name: key
          in: path
          required: true
          description: The unique key of the quota
          schema:
            $ref: "#/components/schemas/QuotaKey"
      responses:
        "204":
          description: Quota deleted successfully
        "404":
          description: Quota not found
        "409":
          description: Quota is in use by connect keys

  /accounts:
    get:
      tags:
        - accounts
      summary: Get all accounts
      description: Returns a list of all accounts managed by the indexer.
      parameters:
        - name: limit
          in: query
          description: The maximum number of accounts to return
          schema:
            type: integer
            minimum: 1
            maximum: 500
            default: 100
        - name: offset
          in: query
          description: The number of accounts to skip
          schema:
            type: integer
            minimum: 0
            default: 0
        - name: connectkey
          in: query
          description: If specified, only accounts associated with the specified connect key will be returned.
          schema:
            type: string
      operationId: getAccounts
      responses:
        "200":
          description: A list of accounts
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Account"
      x-codeSamples:
        - lang: Go
          label: Go
          source: |
            package main

            import (
              "context"
              admin "go.sia.tech/indexd/admin"
            )

            func main() {
              c := admin.NewClient("http://localhost:9980", "your-admin-password")
              accounts, err := c.Accounts(context.Background())
              // ...
            }
        - lang: JavaScript
          label: JavaScript
          source: |
            import { Admin } from "@siafoundation/indexd-js"

            const admin = Admin({
              api: "http://localhost:9980/api",
              password: "your-admin-password"
            })
            const accounts = await admin.accounts()

  /account/{accountkey}:
    get:
      tags:
        - accounts
      summary: Retrieve an individual account
      description: Get an account from the indexer.
      operationId: getAccount
      parameters:
        - name: accountkey
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Account retrieved successfully
          content:
            application/json:
              schema:
                type: object
                allOf:
                  - $ref: "#/components/schemas/Account"
        "404":
          description: Account not found
    delete:
      tags:
        - accounts
      summary: Delete an account
      description: Delete an account from the indexer.
      operationId: deleteAccount
      parameters:
        - name: accountkey
          in: path
          required: true
          schema:
            type: string
      responses:
        "204":
          description: Account deleted successfully
        "404":
          description: Account not found
      x-codeSamples:
        - lang: JavaScript
          label: JavaScript
          source: |
            import { Admin } from "@siafoundation/indexd-js"

              const admin = Admin({
                api: "http://localhost:9980/api",
                password: "your-admin-password"
              })
              await admin.accountDelete("ed25519:your-public-key")

  /alerts:
    get:
      tags:
        - alerts
      operationId: getAlerts
      summary: Get all alerts within the offset and limit
      parameters:
        - name: limit
          in: query
          description: The maximum number of alerts to return
          schema:
            type: integer
            minimum: 1
            maximum: 500
            default: 100
        - name: offset
          in: query
          description: The number of alerts to skip
          schema:
            type: integer
            minimum: 0
            default: 0
        - name: severity
          in: query
          schema:
            allOf:
              - $ref: "#/components/schemas/Severity"
              - description: The severity of the alert.
      responses:
        "200":
          description: List of alerts
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Alert"

  /alerts/dismiss:
    post:
      tags:
        - alerts
      summary: Dismiss a list of alert IDs
      operationId: dismissAlerts
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: array
              items:
                $ref: "#/components/schemas/Hash256"
      responses:
        "200":
          description: Alerts dismissed successfully

  /alerts/{alertid}:
    get:
      tags:
        - alerts
      summary: Get an individual alert by ID
      operationId: getAlert
      parameters:
        - name: alertid
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/Hash256"
      responses:
        "200":
          description: Specified alert
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Alert"

  /contract/{contractid}:
    get:
      tags:
        - contracts
      summary: Get a specific contract by ID
      operationId: getContract
      parameters:
        - name: contractid
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/FileContractID"
      responses:
        "200":
          description: Contract metadata
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Contract"
      x-codeSamples:
        - lang: Go
          label: Go
          source: |
            package main

            import (
              "context"
              admin "go.sia.tech/indexd/admin"
              "go.sia.tech/core/types"
            )

            func main() {
              c := admin.NewClient("http://localhost:9980", "your-admin-password")
              var id types.FileContractID
              contract, err := c.Contract(context.Background(), id)
              // ...
            }
        - lang: JavaScript
          label: JavaScript
          source: |
            import { Admin } from "@siafoundation/indexd-js"

            const admin = Admin({
              api: "http://localhost:9980/api",
              password: "your-admin-password"
            })
            const contract = await admin.contract("filecontractid:your-id")
    delete:
      tags:
        - contracts
      summary: Delete a contract
      description: Deletes a contract by unpinning all its sectors and marking the contract as bad
      operationId: deleteContract
      parameters:
        - name: contractid
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/FileContractID"
      responses:
        "200":
          description: Contract deleted successfully
        "404":
          description: Contract not found

  /contracts:
    get:
      tags:
        - contracts
      summary: Get all contracts
      operationId: getContracts
      parameters:
        - name: limit
          in: query
          description: The maximum number of contracts to return
          schema:
            type: integer
            minimum: 1
            maximum: 500
            default: 100
        - name: offset
          in: query
          description: The number of contracts to skip
          schema:
            type: integer
            minimum: 0
            default: 0
        - name: revisable
          in: query
          description: Filter contracts that are revisable (true) or not (false)
          required: false
          schema:
            type: boolean
            default: true
        - name: good
          in: query
          description: Filter contracts that are good (true) or not (false)
          required: false
          schema:
            type: boolean
        - name: id
          in: query
          description: If provided, only include contracts from this set of IDs.
          schema:
            type: array
            items:
              $ref: "#/components/schemas/FileContractID"
          style: form
          explode: true
        - name: hostkey
          in: query
          description: If provided, only include contracts on this set of hosts.
          schema:
            type: array
            items:
              $ref: "#/components/schemas/PublicKey"
          style: form
          explode: true
        - name: sortby
          in: query
          description: Field to sort by. Can be specified multiple times for multi-level sorting.
          required: false
          schema:
            type: array
            items:
              type: string
              enum:
                - id
                - hostKey
                - formation
                - renewedFrom
                - nextPrune
                - lastBroadcastAttempt
                - revisionNumber
                - proofHeight
                - expirationHeight
                - capacity
                - size
                - initialAllowance
                - remainingAllowance
                - totalCollateral
                - renewedTo
                - usedCollateral
                - contractPrice
                - minerFee
                - good
                - state
                - spending.appendSector
                - spending.freeSector
                - spending.fundAccount
                - spending.sectorRoots
          style: form
          explode: true
        - name: desc
          in: query
          description: Whether to sort in descending order. Must be provided for each sortby parameter.
          required: false
          schema:
            type: array
            items:
              type: boolean
          style: form
          explode: true
      responses:
        "200":
          description: A list of contracts
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Contract"
      x-codeSamples:
        - lang: Go
          label: Go
          source: |
            package main

            import (
              "context"
              admin "go.sia.tech/indexd/admin"
            )

            func main() {
              c := admin.NewClient("http://localhost:9980", "your-admin-password")
              contracts, err := c.Contracts(context.Background())
              // ...
            }
        - lang: JavaScript
          label: JavaScript
          source: |
            import { Admin } from "@siafoundation/indexd-js"

            const admin = Admin({
              api: "http://localhost:9980/api",
              password: "your-admin-password"
            })
            const contracts = await admin.contracts()

  /debug/pprof/{handler}:
    get:
      tags:
        - debug
      summary: Get pprof profiling data
      description: >
        Returns profiling data for the specified handler. This is useful for
        debugging and performance analysis. This route is only available in
        debug mode.
      operationId: getPprofData
      parameters:
        - name: handler
          in: path
          required: true
          schema:
            type: string
            enum:
              [
                allocs,
                block,
                cmdline,
                goroutine,
                heap,
                mutex,
                profile,
                threadcreate,
                trace,
              ]
      responses:
        "200":
          description: Profiling data in binary format
          content:
            application/octet-stream:
              schema:
                type: string
                format: binary

  /debug/trigger/{action}:
    post:
      tags:
        - debug
      summary: Trigger a specific debug action
      description: >
        Triggers a specific action such as contract maintenance or pruning.
        This is useful for testing and debugging purposes. This route is only
        available in debug mode.

      operationId: triggerDebugAction
      parameters:
        - name: action
          in: path
          required: true
          schema:
            type: string
            enum: [funding, maintenance, pruning, scanning]
      responses:
        "204":
          description: Action triggered successfully
        "400":
          description: Invalid action specified
      x-codeSamples:
        - lang: Go
          label: Go
          source: |
            package main

            import (
              "context"
              admin "go.sia.tech/indexd/admin"
            )

            func main() {
              c := admin.NewClient("http://localhost:9980", "your-admin-password")
              err := c.TriggerAction(context.Background(), "maintenance")
              // ...
            }

  /explorer/exchange-rate/siacoin/{currency}:
    get:
      tags:
        - misc
      summary: Get the exchange rate for Siacoin in a specific currency
      operationId: getExchangeRate
      parameters:
        - name: currency
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Exchange rate details
          content:
            application/json:
              schema:
                type: string
                format: float
                description: The exchange rate of Siacoin in the specified currency
        "400":
          description: Invalid currency provided
        "503":
          description: Service unavailable, unable to fetch exchange rate, explorer is disabled.
      x-codeSamples:
        - lang: Go
          label: Go
          source: |
            package main

            import (
              "context"
              admin "go.sia.tech/indexd/admin"
            )

            func main() {
              c := admin.NewClient("http://localhost:9980", "your-admin-password")
              rate, err := c.ExplorerSiacoinExchangeRate(context.Background(), "usd")
              // ...
            }
        - lang: JavaScript
          label: JavaScript
          source: |
            import { Admin } from "@siafoundation/indexd-js"

            const admin = Admin({
              api: "http://localhost:9980/api",
              password: "your-admin-password"
            })
            const rate = await admin.explorerExchangeRateSiacoin("usd")

  /host/{hostkey}:
    get:
      tags:
        - hosts
      summary: Returns detailed information about a specific host
      operationId: getHost
      parameters:
        - name: hostkey
          in: path
          description: Public key of the host
          schema:
            $ref: "#/components/schemas/PublicKey"
          required: true
      responses:
        "200":
          description: Host details
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Host"
        "404":
          description: Host not found
      x-codeSamples:
        - lang: Go
          label: Go
          source: |
            package main

            import (
              "context"
              admin "go.sia.tech/indexd/admin"
              "go.sia.tech/core/types"
            )

            func main() {
              c := admin.NewClient("http://localhost:9980", "your-admin-password")
              var hostKey types.PublicKey
              host, err := c.Host(context.Background(), hostKey)
              // ...
            }
        - lang: JavaScript
          label: JavaScript
          source: |
            import { Admin } from "@siafoundation/indexd-js"

            const admin = Admin({
              api: "http://localhost:9980/api",
              password: "your-admin-password"
            })
            const host = await admin.host("ed25519:host-public-key")

  /hosts:
    get:
      tags:
        - hosts
      summary: Get all hosts
      operationId: getHosts
      parameters:
        - name: usable
          in: query
          description: Filter hosts that are usable (true) or not (false)
          required: false
          schema:
            type: boolean
        - name: blocked
          in: query
          description: Filter hosts that are blocked (true) or not (false)
          required: false
          schema:
            type: boolean
        - name: activecontracts
          in: query
          description: Filter hosts that have active contracts (true) or not (false)
          required: false
          schema:
            type: boolean
        - name: hostkey
          in: query
          description: If provided, only include hosts from this set of public keys.
          schema:
            type: array
            items:
              $ref: "#/components/schemas/PublicKey"
          style: form
          explode: true
        - name: sortby
          in: query
          description: Field to sort by. Can be specified multiple times for multi-level sorting.
          required: false
          schema:
            type: array
            items:
              type: string
              enum:
                - recentUptime
                - settings.protocolVersion
                - settings.acceptingContracts
                - settings.maxCollateral
                - settings.maxContractDuration
                - settings.remainingStorage
                - settings.totalStorage
                - settings.prices.contractPrice
                - settings.prices.collateral
                - settings.prices.storagePrice
                - settings.prices.ingressPrice
                - settings.prices.egressPrice
                - settings.prices.freeSectorPrice
          style: form
          explode: true
        - name: desc
          in: query
          description: Whether to sort in descending order. Must be provided for each sortby parameter.
          required: false
          schema:
            type: array
            items:
              type: boolean
          style: form
          explode: true
      responses:
        "200":
          description: A list of hosts
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Host"
      x-codeSamples:
        - lang: Go
          label: Go
          source: |
            package main

            import (
              "context"
              admin "go.sia.tech/indexd/admin"
            )

            func main() {
              c := admin.NewClient("http://localhost:9980", "your-admin-password")
              hosts, err := c.Hosts(context.Background())
              // ...
            }
        - lang: JavaScript
          label: JavaScript
          source: |
            import { Admin } from "@siafoundation/indexd-js"

            const admin = Admin({
              api: "http://localhost:9980/api",
              password: "your-admin-password"
            })
            const hosts = await admin.hosts()
  /hosts/blocklist:
    get:
      tags:
        - hosts
      summary: Get the blocklist of hosts
      operationId: getHostsBlocklist
      parameters:
        - name: limit
          in: query
          description: The maximum number of blocked hosts to return
          schema:
            type: integer
            minimum: 1
            maximum: 500
            default: 100
        - name: offset
          in: query
          description: The number of blocked hosts to skip
          schema:
            type: integer
            minimum: 0
            default: 0
      responses:
        "200":
          description: A list of blocked hostkeys
          content:
