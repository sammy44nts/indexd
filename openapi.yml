openapi: "3.0.0"
info:
  title: Indexd API
  description: Indexd is a pinning service for the Sia network. It allows app developers to pin data they uploaded to the Sia network, once pinned the indexer will ensure that data remains healthy on the network.
  version: 2.0.0

tags:
  - name: application
    description: Application API
  - name: admin
    description: Admin API

paths:
    #############################
    #
    # Admin API
    #
    #############################

    /state:
      get:
        tags:
          - admin
        summary: "Get the state of the indexer"
        description: Returns general information about the indexer.
        operationId: getState
        responses:
          '200':
            description: The state of the indexer
            content:
              application/json:
                schema:
                  type: object
                  allOf:
                  - $ref: "#/components/schemas/BuildState"
                  properties:
                    scanHeight:
                      type: integer
                      format: uint64
                      description: The height up until which the wallet is synced
                    startTime:
                      type: string
                      format: date-time
                      description: The time the indexer was started

    /accounts:
      get:
        tags:
          - admin
        summary: Get all accounts
        description: Returns a list of all accounts managed by the indexer.
        parameters:
          - name: limit
            in: query
            description: The maximum number of accounts to return
            schema:
              type: integer
              minimum: 1
              maximum: 500
              default: 100
          - name: offset
            in: query
            description: The number of accounts to skip
            schema:
              type: integer
              minimum: 0
              default: 0
        operationId: getAccounts
        responses:
          '200':
            description: A list of accounts
            content:
              application/json:
                schema:
                  type: array
                  items:
                    $ref: "#/components/schemas/PublicKey"

    /account/{accountkey}:
      post:
        tags:
          - admin
        summary: Add an account
        description: Add an account to the indexer. This makes sure the indexer funds an ephemeral account with every host on behalf of this account.
        operationId: addAccount
        parameters:
          - name: accountkey
            in: path
            required: true
            schema:
              $ref: "#/components/schemas/PublicKey"
        responses:
          '204':
            description: Account added successfully
          '409':
            description: Account already exists
      put:
        tags:
          - admin
        summary: Update an account
        description: Rotate an existing account key to a new key. This is useful if you lose access to your account's secret key, by rotating to a new key you retain access to all associated data.
        operationId: updateAccount
        parameters:
          - name: accountkey
            in: path
            required: true
            schema:
              type: string
        requestBody:
          content:
            application/json:
              schema:
                type: object
                properties:
                  newAccountKey:
                    $ref: "#/components/schemas/PublicKey"
        responses:
          '204':
            description: Account key rotated successfully
          '400':
            description: Invalid new account key
          '404':
            description: Account not found
          '409':
            description: New account key already exists
      delete:
        tags:
          - admin
        summary: Delete an account
        description: Delete an account from the indexer.
        operationId: deleteAccount
        parameters:
          - name: accountkey
            in: path
            required: true
            schema:
              type: string
        responses:
          '204':
            description: Account deleted successfully 
          '404':
            description: Account not found

    /contract/{contractid}:
      get:
        tags:
          - admin
        summary: Get a specific contract by ID
        operationId: getContract
        parameters:
          - name: contractid
            in: path
            required: true
            schema:
              $ref: "#/components/schemas/FileContractID"
        responses:
          '200':
            description: Contract metadata
            content:
              application/json:
                schema:
                  $ref: "#/components/schemas/Contract"

    /contracts:
      get:
        tags:
          - admin
        summary: Get all contracts
        operationId: getContracts
        parameters:
          - name: limit
            in: query
            description: The maximum number of contracts to return
            schema:
              type: integer
              minimum: 1
              maximum: 500
              default: 100
          - name: offset
            in: query
            description: The number of contracts to skip
            schema:
              type: integer
              minimum: 0
              default: 0
          - name: revisable
            in: query
            description: Filter contracts that are revisable (true) or not (false)
            required: false
            schema:
              type: boolean
              default: true
          - name: good
            in: query
            description: Filter contracts that are good (true) or not (false)
            required: false
            schema:
              type: boolean
        responses:
          '200':
            description: A list of contracts
            content:
              application/json:
                schema:
                  type: array
                  items:
                    $ref: "#/components/schemas/Contract"

    /explorer/exchange-rate/siacoin/{currency}:
      get:
        tags:
          - admin
        summary: Get the exchange rate for Siacoin in a specific currency
        operationId: getExchangeRate
        parameters:
          - name: currency
            in: path
            required: true
            schema:
              type: string
        responses:
          '200':
            description: Exchange rate details
            content:
              application/json:
                schema:
                  type: string
                  format: float
                  description: The exchange rate of Siacoin in the specified currency
          '400':
            description: Invalid currency provided
          '503':
            description: Service unavailable, unable to fetch exchange rate, explorer is disabled.

    /host/{hostkey}:
      get:
        tags:
          - admin
        summary: Returns detailed information about a specific host
        operationId: getHost
        parameters:
          - name: hostkey
            in: path
            description: Public key of the host
            schema:
              $ref: "#/components/schemas/PublicKey"
            required: true
        responses:
          '200':
            description: Host details
            content:
              application/json:
                schema:
                  $ref: "#/components/schemas/Host"
          '404':
            description: Host not found

    /hosts:
      get:
        tags:
          - admin
        summary: Get all hosts
        operationId: getHosts
        parameters:
          - name: usable
            in: query
            description: Filter hosts that are usable (true) or not (false)
            required: false
            schema:
              type: boolean
          - name: blocked
            in: query
            description: Filter hosts that are blocked (true) or not (false)
            required: false
            schema:
              type: boolean
          - name: activecontracts
            in: query
            description: Filter hosts that have active contracts (true) or not (false)
            required: false
            schema:
              type: boolean
        responses:
          '200':
            description: A list of hosts
            content:
              application/json:
                schema:
                  type: array
                  items:
                    $ref: "#/components/schemas/Host"
    /hosts/blocklist:
      get:
        tags:
          - admin
        summary: Get the blocklist of hosts
        operationId: getHostsBlocklist
        parameters:
          - name: limit
            in: query
            description: The maximum number of blocked hosts to return
            schema:
              type: integer
              minimum: 1
              maximum: 500
              default: 100
          - name: offset
            in: query
            description: The number of blocked hosts to skip
            schema:
              type: integer
              minimum: 0
              default: 0
        responses:
          '200':
            description: A list of blocked hostkeys
            content:
              application/json:
                schema:
                  type: array
                  items:
                    $ref: "#/components/schemas/PublicKey"
      put: 
        tags:
          - admin
        summary: Update the blocklist of hosts
        operationId: updateHostsBlocklist
        requestBody:
          required: true
          content:
            application/json:
              schema:
                type: object
                properties:
                  hostkeys:
                    type: array
                    items:
                      $ref: "#/components/schemas/PublicKey"
                  reason:
                    type: string
                    description: Reason for blocking the hosts
        responses:
          '200':
            description: Blocklist updated successfully
    /hosts/blocklist/{hostkey}:
      delete:
        tags:
          - admin
        summary: Remove a host from the blocklist
        operationId: removeHostFromBlocklist
        parameters:
          - name: hostkey
            in: path
            required: true
            schema:
              type: string
        responses:
          '200':
            description: Host removed from blocklist successfully

    /settings/contracts:
      get:
        tags:
          - admin
        summary: Get contract settings
        description: Returns the current settings for contract maintenance.
        operationId: getSettingsContracts
        responses:
          '200':
            description: Contract settings details
            content:
              application/json:
                schema:
                  $ref: "#/components/schemas/MaintenanceSettings"
      put:
        tags:
          - admin
        summary: Update contract settings
        operationId: updateSettingsContracts
        requestBody:
          required: true
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MaintenanceSettings"
        responses:
          '200':
            description: Contract settings updated successfully
    /settings/hosts:
      get:
        tags:
          - admin
        summary: Get host settings
        description: Returns the current settings for host usability. These settings are used to determine which hosts are considered usable for forming new contracts.
        operationId: getSettingsHosts
        responses:
          '200':
            description: Host settings details
            content:
              application/json:
                schema:
                  $ref: "#/components/schemas/UsabilitySettings"
      put:
        tags:
          - admin
        summary: Update host settings
        operationId: updateSettingsHosts
        requestBody:
          required: true
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UsabilitySettings"
        responses:
          '200':
            description: Host settings updated successfully
    /settings/pricepinning:
      get:
        tags:
          - admin
        summary: Get price pinning settings
        operationId: getSettingsPricePinning
        responses:
          '200':
            description: Price pinning settings details
            content:
              application/json:
                schema:
                  $ref: "#/components/schemas/PinnedSettings"
      put:
        tags:
          - admin
        summary: Update price pinning settings
        operationId: updateSettingsPricePinning
        requestBody:
          required: true
          content:
            application/json:
              schema: 
                $ref: "#/components/schemas/PinnedSettings"
        responses:
          '200':
            description: Price pinning settings updated successfully

    /wallet:
      get:
        tags:
          - admin
        summary: Get wallet information
        operationId: getWallet
        responses:
          '200':
            description: Wallet details
            content:
              application/json:
                schema:
                  type: object
                  properties:
                    spendable:
                      allOf:
                      - $ref: "#/components/schemas/Currency"
                      - description: The amount of spendable siacoins in the wallet
                    confirmed:
                      allOf:
                        - $ref: "#/components/schemas/Currency"
                        - description: The amount of siacoins that have been confirmed in a block
                    unconfirmed:
                      allOf:
                        - $ref: "#/components/schemas/Currency"
                        - description: The amount of siacoins that have not been confirmed in a block
                    immature:
                      allOf:
                        - $ref: "#/components/schemas/Currency"
                        - description: The amount of siacoins that have yet to mature
                    address:
                      allOf:
                        - $ref: "#/components/schemas/Address"
                        - description: The wallet's address
    /wallet/events:
      get:
        tags:
          - admin
        summary: Get wallet events
        description: Returns all events related to the wallet.
        operationId: getWalletEvents
        parameters:
          - name: limit
            in: query
            description: The maximum number of events to return
            schema:
              type: integer
              minimum: 1
              maximum: 500
              default: 100
          - name: offset
            in: query
            description: The number of events to skip
            schema:
              type: integer
              minimum: 0
              default: 0
        responses:
          '200':
            description: Wallet events details
            content:
              application/json:
                schema:
                  type: array
                  items:
                    $ref: "#/components/schemas/Event"

    /wallet/pending:
      get:
        tags:         
          - admin
        summary: Get pending wallet transactions
        description: Returns all unconfirmed events in the wallet.
        operationId: getWalletPending
        responses:
          '200':
            description: Pending wallet transactions details
            content:
              application/json:
                schema:
                  type: array
                  items:
                    $ref: "#/components/schemas/Event"
    /wallet/send:
      post:
        tags:
          - admin
        summary: Send Siacoin to a specific address
        operationId: sendSiacoin
        requestBody:
          required: true
          content:
            application/json:
              schema:
                type: object
                properties:
                  address:
                    allOf:
                      - $ref: "#/components/schemas/Address"
                      - description: The address to send the siacoins to
                  amount:
                    allOf:
                      - $ref: "#/components/schemas/Currency"
                      - description: The amount of siacoins to send
                  subtractMinerFee:
                    type: boolean
                    description: Whether to subtract the miner fee from the amount
                  useUnconfirmed:
                    type: boolean
                    description: Whether to use unconfirmed outputs
        responses:
          '200':
            description: Transaction sent successfully
            content:
              application/json:
                schema:
                  allOf:
                    - $ref: "#/components/schemas/TransactionID"
                    - description: The ID of the transaction


    #############################
    #
    # Application API
    #
    #############################

    /slabs/pin:
      post:
        tags:
          - application
        summary: Pin a slab to the indexer
        operationId: pinSlab
        requestBody:
          required: true
          content:
            application/json:
              schema:
                type: object
                properties:
                  encryptionKey:
                    allOf:
                      - $ref: "#/components/schemas/EncryptionKey"
                      - description: The encryption key used to encrypt the shards
                  minShards:
                    type: integer
                    minimum: 1
                    format: uint
                    description: The number of data shards a piece gets erasure-coded into
                  sectors:
                    type: array
                    items:
                      type: object
                      properties:
                        root: 
                          allOf:
                            - $ref: "#/components/schemas/Hash256"
                            - description: The root of the sector
                        hostKey:
                          allOf:
                            - $ref: "#/components/schemas/PublicKey"
                            - description: The public key of the host that stores the sector
        responses:
          '201':
            description: Slab pinned successfully
            content:
              application/json:
                schema:
                  type: object
                  properties:
                    slabID:
                      allOf:
                        - $ref: "#/components/schemas/SlabID"
                        - description: The ID of the pinned slab

    /slabs/{slabid}:
      delete:
        tags:
          - application
        summary: Unpin a slab from the indexer
        operationId: unpinSlab
        parameters:
          - name: slabid
            in: path
            required: true
            schema:
              type: string
        responses:
          '204':
            description: Slab unpinned successfully

components:
  schemas:
    #############################
    #
    # Core types
    #
    #############################
    
    Address:
      allOf:
        - $ref: "#/components/schemas/Hash256"
        - description: The hash of a set of UnlockConditions

    Currency:
      type: string
      pattern: "^\\d+$"
      maxLength: 39 # fits 2^128 - 1
      description: An unsigned amount of Hastings, the smallest unit of currency in Sia. 1 Siacoin (SC) equals 10^24 Hastings (H).

    EncryptionKey:
      type: string
      pattern: ^(key|skey):[0-9a-fA-F]{64}$
      description: A key used to encrypt and decrypt data. The key is either a regular key (key) or a salted key (skey). The latter requires a seed to be used for encryption and decryption.

    Event:
      type: object
      description: A transaction or other event that affects the wallet including miner payouts, siafund claims, and file contract payouts.
      properties:
        id:
          allOf:
            - $ref: "#/components/schemas/Hash256"
            - description: The event's ID
        index:
          allOf:
            - $ref: "#/components/schemas/ChainIndex"
            - description: Information about the block that triggered the creation of this event
        confirmations:
          type: integer
          format: uint64
          description: The number of blocks on top of the block that triggered the creation of this event
        type:
          type: string
          enum:
            - miner
            - foundation
            - siafundClaim
            - v1Transaction
            - v1ContractResolution
            - v2Transaction
            - v2ContractResolution
          description: The type of the event
        data:
          type: object
        maturityHeight:
          allOf:
            - $ref: "#/components/schemas/BlockHeight"
            - description: The block height at which the payout matures.
        timestamp:
          type: string
          format: date-time
          description: The time the event was created
        relevant:
          type: array
          items:
            $ref: "#/components/schemas/Address"

    FileContractID:
      type: string
      pattern: "^fcid:[0-9a-fA-F]{64}$"
      description: A unique identifier for a file contract

    Hash256:
      type: string
      pattern: ^[0-9a-fA-F]{64}$
      description: A 256-bit blake2b hash

    HostPrices:
      type: object
      properties:
        contractPrice:
          allOf:
            - $ref: "#/components/schemas/Currency"
            - description: Cost to the renter for forming, renewing, or refreshing a contract. Paid up front and covers the cost of the revision and storage proof transaction the host broadcasts at the end of the contract.
        collateral:
          allOf:
            - $ref: "#/components/schemas/Currency"
            - description: The amount of Hastings the host will risk per byte of storage per block.
        storagePrice:
          allOf:
            - $ref: "#/components/schemas/Currency"
            - description: Cost per byte of storage per block.
        ingressPrice:
          allOf:
            - $ref: "#/components/schemas/Currency"
            - description: Cost per byte of data uploaded from the host
        egressPrice:
          allOf:
            - $ref: "#/components/schemas/Currency"
            - description: Cost per byte of data downloaded from the host
        tipHeight:
          type: integer
          format: uint64
          description: The height at which the prices were last updated
        validUntil:
          type: string
          format: date-time
          description: The time at which these prices will no longer be honored by the host.
        signature:
          $ref: "#/components/schemas/Signature"

    HostSettings:
      type: object
      properties:
        protocolVersion:
          $ref: "#/components/schemas/SemVer"
        release:
          type: string
          description: Release tag of the host software
          example: "hostd 1.0.0"
        walletAddress:
          $ref: "#/components/schemas/Address"
        acceptingContracts:
          type: boolean
          description: Whether the host is accepting new contracts
        maxCollateral:
          $ref: "#/components/schemas/Currency"
        maxContractDuration:
          type: integer
          format: uint64
          description: Maximum allowed contract duration
        remainingStorage:
          type: integer
          format: uint64
          description: Amount of storage the host has remaining
        totalStorage:
          type: integer
          format: uint64
          description: Total amount of storage space
        prices:
          $ref: "#/components/schemas/HostPrices"

    IPNet:
      type: object
      properties:
        ip: 
          type: string
          description: The IP address in CIDR notation
          example: 100.82.250.91
        mask: 
          type: string
          description: The subnet mask in CIDR notation
          example: 24

    NetAddress:
      type: object
      properties:
        address:
          type: string
          description: The network address of the host, typically in the format "host:port".
          example: "example.com:9980"
        protocol:
          type: string
          enum:
            - siamux
            - quic
          description: The protocol used by the host

    PublicKey:
      type: string
      pattern: "^ed25519:[0-9a-fA-F]{64}$"
      description: A ed25519 public key

    SemVer:
      type: array
      description: "Represents a semantic version as an array of three unsigned 8-bit integers: [major, minor, patch]"
      minItems: 3
      maxItems: 3
      items:
        type: integer
        format: uint8
        minimum: 0
        maximum: 255
      example: [1, 2, 3]

    Signature:
      type: string
      format: byte
      pattern: "[0-9a-fA-F]{64}"
      description: A ed25519 signature

    #############################
    #
    # Helper types
    #
    #############################

    BlockHeight:
      type: integer
      format: uint64
      description: The height of a block
      example: 92813

    BuildState:
      type: object
      properties:
        buildTime:
          type: string
          format: date-time
          description: The build time of the build
        commit:
          type: string
          description: The commit hash of the build
        version:
          type: string
          description: The version of the build
        os:
          type: string
          description: The operating system of the build

    Contract:
      type: object
      properties:
        id:
          allOf:
            - $ref: "#/components/schemas/FileContractID"
            - description: The unique identifier for the file contract.
        hostKey:
          allOf:
            - $ref: "#/components/schemas/PublicKey"
            - description: The public key of the host.
        formation:
          type: string
          description: The time when the contract was formed.
          format: date-time
        renewedFrom:
          allOf:
            - $ref: "#/components/schemas/FileContractID"
            - description: The ID of the contract this one was renewed from, if applicable.

        nextPrune:
          type: string
          description: The time when the contract will be pruned next.
          format: date-time
        lastBroadcastAttempt:
          type: string
          description: The time of the last revision broadcast attempt for the contract.
          format: date-time
          
        revisionNumber:
          allOf:
            - $ref: "#/components/schemas/RevisionNumber"
            - description: The current revision number of the contract
        proofHeight:
          allOf:
            - $ref: "#/components/schemas/BlockHeight"
            - description: The start of the contract's proof window
        expirationHeight:
          allOf:
            - $ref: "#/components/schemas/BlockHeight"
            - description: The end of the contract's proof window
        capacity:
          type: integer
          format: uint64
          description: The amount of data that is paid for already. This is always larger or equal than the size of the contract.
        size:
          type: integer
          format: uint64
          description: The size of the contract in bytes
        initialAllowance:
          allOf:
            - $ref: "#/components/schemas/Currency"
            - description: The initial funds locked in the contract.
        remainingAllowance:
          allOf:
            - $ref: "#/components/schemas/Currency"
            - description: The remaining funds in the contract.
        totalCollateral:
          allOf:
            - $ref: "#/components/schemas/Currency"
            - description: The total amount of collateral locked in the contract.

        renewedTo:
          allOf:
            - $ref: "#/components/schemas/FileContractID"
            - description: The ID of the contract this one was renewed to, if applicable.
        usedCollateral:
          allOf:
            - $ref: "#/components/schemas/Currency"
            - description: The amount of collateral that is already used.
        contractPrice:
          allOf:
            - $ref: "#/components/schemas/Currency"
            - description: The price of forming the contract.
        minerFee:
          allOf:
            - $ref: "#/components/schemas/Currency"
            - description: The miner fee spent on the formation transaction.

        good:
          type: boolean
          description: Whether the contract is considered healthy and usable. If the contract is bad its data will be migrated to another contract.
        state:
          type: string
          description: The state of the contract
          enum:
            - pending
            - active
            - complete
            - failed
        spending:
          allOf:
            - $ref: "#/components/schemas/ContractSpending"
            - description: Costs and spending details of the contract.

    ContractSpending:
      type: object
      properties:
        appendSector:
          allOf:
            - $ref: "#/components/schemas/Currency"
            - description: Total amount spent on appending sectors to a contract
        freeSector:
          allOf:
            - $ref: "#/components/schemas/Currency"
            - description: Total amount spent on freeing sectors in a contract
        fundAccount:
          allOf:
            - $ref: "#/components/schemas/Currency"
            - description: Total amount spent on funding ephemeral accounts
        sectorRoots:
          allOf:
            - $ref: "#/components/schemas/Currency"
            - description: Total amount spent on retrieving sector roots

    Host:
      type: object
      properties:
        publicKey:
          $ref: "#/components/schemas/PublicKey"
        lastAnnouncement:
          type: string
          format: date-time
          description: The time the host last announced itself
        lastFailedScan:
          type: string
          format: date-time
          description: The time the host last failed a scan
        lastSuccessfulScan:
          type: string
          format: date-time
          description: The time the host last successfully scanned
        nextScan:
          type: string
          format: date-time
          description: The time the host is scheduled to be scanned next
        consecutiveFailedScans:
          type: integer
          format: uint64
          description: The number of consecutive failed scans
        recentUptime:
          type: string
          format: float64
          description: The recent uptime of the host as a number between 0 and 1, where 1 means 100% uptime
        addresses:
          type: array
          items:
            $ref: "#/components/schemas/NetAddress"
        networks:
          type: array
          items:
            $ref: "#/components/schemas/IPNet"
        settings:
          $ref: "#/components/schemas/HostSettings"
        usability:
          $ref: "#/components/schemas/HostUsability"
        blocked:
          type: boolean
          description: Whether the host is blocked
        blockedReason:
          type: string
          description: The reason why the host is blocked
          example: "Host has been offline for too long"
        lostSectors:
          type: integer
          format: uint64
          description: The number of sectors the host lost
    
    HostUsability:
      type: object
      properties:
        uptime:
          type: boolean
          description: Whether the host matches a minimum uptime requirement
        maxContractDuration:
          type: boolean
          description: Whether the host supports the maximum contract duration
        maxCollateral:
          type: boolean
          description: Whether the host supports the maximum collateral
        protocolVersion:
          type: boolean
          description: Whether the host supports the required minimum protocol version
        priceValidity:
          type: boolean
          description: Whether the host's prices validity exceeds the minimum required validity
        acceptingContracts:
          type: boolean
          description: Whether the host is currently accepting new contracts
        contractPrice:
          type: boolean
          description: Whether the host's contract price is below the maximum contract price
        collateral:
          type: boolean
          description: Whether the host's collateral is above the minimum collateral
        storagePrice:
          type: boolean
          description: Whether the host's storage price is below the maximum storage price
        ingressPrice:
          type: boolean
          description: Whether the host's ingress price is below the maximum ingress price
        egressPrice:
          type: boolean
          description: Whether the host's egress price is below the maximum egress price  
        freeSectorPrice:
          type: boolean
          description: Whether the host's free sector price is below the maximum free sector price

    MaintenanceSettings:
      type: object
      properties:
        enabled:
          type: boolean
          description: Whether contract maintenance is enabled
          default: false
        wantedContracts:
          type: integer
          format: uint64
          description: The minimum number of contracts to form
          default: 0
        period:
          type: integer
          format: uint64
          description: The length of a contract's period in blocks (1 block being 10 minutes on average)
          default: 0
        renewWindow:
          type: integer
          format: uint64
          description: The number of blocks before the end of a contract that a contract should be renewed
          default: 0

    PinnedSettings:
      type: object
      properties:
        currecty:
          type: string
          description: The currency used for price pinning. If this is empty price pinning is disabled.
          example: "usd"
        maxEgressPrice:
          type: number
          format: float
          description: The maximum egress price a host can charge, in the specified currency. This pin is disabled if the value is 0.
        maxIngressPrice:
          type: number
          format: float
          description: The maximum ingress price a host can charge, in the specified currency. This pin is disabled if the value is 0.
        maxStoragePrice:
          type: number
          format: float
          description: The maximum storage price a host can charge, in the specified currency. This pin is disabled if the value is 0.
        minCollateral:
          type: number
          format: float
          description: The minimum collateral a host must put up, in the specified currency. This pin is disabled if the value is 0.

    RevisionNumber:
      type: integer
      format: uint64
      description: The revision number of the contract
      example: 246

    SlabID:
      type: string
      pattern: ^[0-9a-fA-F]{64}$
      description: A unique identifier for a slab, which is a collection of data shards stored on hosts.

